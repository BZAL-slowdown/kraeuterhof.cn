    // 初始化页面
    document.addEventListener('DOMContentLoaded', function() {
      // 初始渲染所有作品
      renderWorks(works);
      
      // 分类筛选功能
      const categoryBtns = document.querySelectorAll('.category-btn');
      
      categoryBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          // 更新按钮样式
          categoryBtns.forEach(b => {
            b.classList.remove('bg-white', 'text-primary', 'font-semibold');
            b.classList.add('bg-white/20', 'text-white', 'font-medium', 'hover:bg-white/30');
          });
          this.classList.remove('bg-white/20', 'text-white', 'font-medium', 'hover:bg-white/30');
          this.classList.add('bg-white', 'text-primary', 'font-semibold');
          
          // 根据分类筛选并渲染作品
          const category = this.getAttribute('data-category');
          filterWorks(category);
        });
      });
    });
    
    // 渲染作品卡片
    function renderWorks(worksArray) {
      const worksGrid = document.getElementById('works-grid');
      worksGrid.innerHTML = '';
      
      worksArray.forEach(work => {
        const card = document.createElement('div');
        card.className = 'group card-hover bg-white rounded-xl overflow-hidden shadow-md';
        card.setAttribute('data-category', work.category);
        
        card.innerHTML = `
          <a href="${work.url}" target="_blank" class="block cursor-pointer">
            <div class="h-40 relative flex items-center justify-center p-4 overflow-hidden" style="background-image: url('${work.image}'); background-size: cover; background-position: center;">
              <div class="absolute inset-0 bg-black/10 backdrop-blur-3xl"></div>
              <img src="${work.image}" alt="${work.title}" class="relative max-w-full max-h-full object-contain transition-transform duration-500 group-hover:scale-110 rounded-xl">
            </div>
            <div class="p-4 flex flex-col justify-between" style="height: 140px;">
              <div>
                <h3 class="text-lg font-semibold mb-1 text-dark truncate" title="${work.title}">${work.title}</h3>
                <p class="text-gray-500 text-sm mb-3 h-10 line-clamp-2">${work.description}</p>
              </div>
              <div class="flex justify-between items-center mt-2">
                <!--span class="text-primary font-bold text-lg">${work.price}</span-->
                <span class="text-xs px-2 py-1 bg-primary/10 text-primary font-medium rounded-full">${getCategoryName(work.category)}</span>
              </div>
            </div>
          </a>
        `;
        
        worksGrid.appendChild(card);
      });
    }
    
    // 筛选作品
    function filterWorks(category) {
      let filteredWorks;
      
      if (category === 'all') {
        filteredWorks = works;
      } else {
        filteredWorks = works.filter(work => work.category === category);
      }
      
      renderWorks(filteredWorks);
    }
    
    // 获取分类名称
    function getCategoryName(category) {
      const categoryMap = {
        'ai': 'AI工具',
        'cms': 'CMS插件',
        'seo': 'SEO优化',
        'multilang': '多语言'
      };
      
      return categoryMap[category] || category;
    }
  </script>
