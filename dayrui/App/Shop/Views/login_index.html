<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员登录 - 七叶庄园</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f3f6f4;color:#173b27;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}
    a{color:inherit;text-decoration:none}
    .top{height:92px;display:flex;align-items:center;justify-content:center;background:#fff;border-bottom:1px solid #e3e9e5}
    .top img{height:58px;width:auto;max-width:260px;display:block;object-fit:contain}
    .logo-text{display:none;color:#1c5231;font-size:26px;font-weight:800;letter-spacing:2px}
    .page{max-width:1080px;margin:0 auto;padding:72px 22px;display:grid;grid-template-columns:minmax(0,1fr) 440px;gap:48px;align-items:center}
    .eyebrow{margin:0 0 12px;color:#6f8377;font-size:13px;text-transform:uppercase}
    h1{margin:0;font-size:38px;line-height:1.18;color:#173b27}
    .lead{margin:18px 0 0;color:#5f7367;font-size:16px;line-height:1.9;max-width:520px}
    .card{background:#fff;border:1px solid #dde6e0;border-radius:8px;box-shadow:0 18px 45px rgba(28,82,49,.08);padding:30px}
    .card h2{margin:0 0 22px;font-size:28px;color:#173b27}
    .form{display:grid;gap:18px}
    label{display:block;margin-bottom:7px;color:#263b2f;font-size:14px;font-weight:700}
    input[type=text],input[type=password]{width:100%;height:44px;border:1px solid #cfdad3;border-radius:4px;padding:0 12px;font-size:15px;background:#fff;color:#16291d;outline:none}
    input:focus{border-color:#1c5231;box-shadow:0 0 0 3px rgba(28,82,49,.12)}
    .actions{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:6px}
    .remember{display:flex;align-items:center;gap:8px;color:#566b5e;font-size:14px}
    .find{color:#1c5231;font-weight:700;font-size:14px}
    .submit{height:46px;border:0;border-radius:4px;background:#1c5231;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
    .submit:disabled{background:#9bb3a4;cursor:not-allowed}
    .msg{display:none;padding:11px 12px;border-radius:4px;font-size:14px;line-height:1.6}
    .msg.ok{display:block;background:#e8f5ee;color:#126c3d;border:1px solid #bde2ca}
    .msg.err{display:block;background:#fff1f0;color:#9f1d16;border:1px solid #f0c5c0}
    .foot{margin-top:22px;padding-top:18px;border-top:1px solid #edf1ee;color:#63766a;font-size:14px;text-align:center}
    .foot a{color:#1c5231;font-weight:700}
    @media(max-width:860px){.page{grid-template-columns:1fr;max-width:540px;padding-top:42px}.intro{display:none}.card{padding:24px}.top{height:78px}.top img{height:46px}}
  </style>
</head>
<body>
  <header class="top">
    <a href="{$home_url}">
      <img src="/uploadfile/202512/c35e2de6b2eae6a.png" alt="七叶庄园" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span class="logo-text">七叶庄园</span>
    </a>
  </header>

  <main class="page">
    <section class="intro">
      <p class="eyebrow">MEMBER ACCOUNT</p>
      <h1>登录七叶庄园会员中心</h1>
      <p class="lead">登录后可以查看订单、维护收货信息，并在购买时自动带入已保存的会员资料。</p>
    </section>

    <section class="card">
      <h2>会员登录</h2>
      <form class="form" id="loginForm">
        {dr_form_hidden()}
        <input type="hidden" name="back" value="{$back_url}">
        <div>
          <label for="account">账号</label>
          <input id="account" name="account" autocomplete="username" placeholder="手机号 / 邮箱 / 用户名">
        </div>
        <div>
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入登录密码">
        </div>
        <div class="actions">
          <label class="remember"><input type="checkbox" name="remember" value="1"> 记住登录</label>
          <a class="find" href="{$find_url}">找回密码</a>
        </div>
        <div id="message" class="msg"></div>
        <button class="submit" id="submitBtn" type="submit">登录</button>
      </form>
      <div class="foot">还没有账号？ <a href="{$register_url}">注册新账号</a></div>
    </section>
  </main>

  <script>
    const loginUrl = '{$login_url}';
    const form = document.getElementById('loginForm');
    const submitButton = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    function showMessage(text, ok) {
      message.textContent = text || '';
      message.className = text ? 'msg ' + (ok ? 'ok' : 'err') : 'msg';
    }
    function refreshToken(res) {
      if (!res || !res.token || !res.token.name || !res.token.value) {
        return;
      }
      let token = form.querySelector('input[name="' + res.token.name + '"]');
      if (!token) {
        token = document.createElement('input');
        token.type = 'hidden';
        token.name = res.token.name;
        form.appendChild(token);
      }
      token.value = res.token.value;
    }
    function post(url, data) {
      return fetch(url, {
        method: 'POST',
        body: data,
        credentials: 'same-origin',
        headers: {'X-Requested-With': 'XMLHttpRequest'}
      }).then(function (response) {
        return response.text().then(function (text) {
          try {
            return JSON.parse(text);
          } catch (e) {
            throw new Error(text ? text.replace(/<[^>]+>/g, '').trim().slice(0, 120) : '接口没有返回有效数据');
          }
        });
      });
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      submitButton.disabled = true;
      post(loginUrl, new FormData(form)).then(function (res) {
        refreshToken(res);
        showMessage(res.msg || (res.code ? '登录成功' : '登录失败'), !!res.code);
        if (res.code && res.data && res.data.url) {
          window.location.href = res.data.url;
        } else {
          submitButton.disabled = false;
        }
      }).catch(function (error) {
        showMessage(error && error.message ? error.message : '登录失败，请稍后再试', false);
        submitButton.disabled = false;
      });
    });
  </script>
</body>
</html>
