<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码 - 七叶庄园</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#f3f6f4;color:#173b27;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}
    a{color:inherit;text-decoration:none}
    .top{height:92px;display:flex;align-items:center;justify-content:center;background:#fff;border-bottom:1px solid #e3e9e5}
    .top img{height:58px;width:auto;max-width:260px;display:block;object-fit:contain}
    .logo-text{display:none;color:#1c5231;font-size:26px;font-weight:800;letter-spacing:2px}
    .page{max-width:1100px;margin:0 auto;padding:68px 22px 72px;display:grid;grid-template-columns:minmax(0,.95fr) minmax(380px,480px);gap:34px;align-items:center}
    .intro{padding:10px 0 0}
    .eyebrow{margin:0 0 12px;color:#6f8377;font-size:13px;text-transform:uppercase}
    h1{margin:0;font-size:38px;line-height:1.18;color:#173b27}
    .lead{margin:18px 0 0;color:#5f7367;font-size:16px;line-height:1.9;max-width:540px}
    .points{margin:28px 0 0;display:grid;gap:12px;max-width:540px}
    .point{display:flex;gap:10px;align-items:flex-start;color:#395044;font-size:14px;line-height:1.7}
    .dot{width:8px;height:8px;border-radius:50%;background:#1c5231;margin-top:8px;flex:none}
    .card{background:#fff;border:1px solid #dde6e0;border-radius:8px;box-shadow:0 18px 45px rgba(28,82,49,.08);padding:30px}
    .card h2{margin:0 0 8px;font-size:28px;color:#173b27}
    .hint{margin:0 0 24px;color:#6f8377;font-size:14px;line-height:1.7}
    .form{display:grid;gap:16px}
    label{display:block;margin-bottom:7px;color:#263b2f;font-size:14px;font-weight:600}
    input{width:100%;height:44px;border:1px solid #cfdad3;border-radius:4px;padding:0 12px;font-size:15px;background:#fff;color:#16291d;outline:none}
    input:focus{border-color:#1c5231;box-shadow:0 0 0 3px rgba(28,82,49,.12)}
    .row{display:grid;grid-template-columns:minmax(0,1fr) 132px;gap:10px;align-items:center}
    .captcha{height:44px;border:1px solid #d7e0da;border-radius:4px;overflow:hidden;background:#f8faf8;display:flex;align-items:center;justify-content:center}
    .captcha img{width:100%;height:100%;object-fit:cover}
    .send{height:44px;border:1px solid #1c5231;border-radius:4px;background:#fff;color:#1c5231;font-size:14px;font-weight:700;cursor:pointer}
    .send:disabled{border-color:#cfdad3;color:#8a9a90;background:#f4f6f5;cursor:not-allowed}
    .submit{height:46px;border:0;border-radius:4px;background:#1c5231;color:#fff;font-size:16px;font-weight:700;cursor:pointer}
    .submit:disabled{background:#9bb3a4;cursor:not-allowed}
    .msg{display:none;padding:11px 12px;border-radius:4px;font-size:14px;line-height:1.6}
    .msg.ok{display:block;background:#e8f5ee;color:#126c3d;border:1px solid #bde2ca}
    .msg.err{display:block;background:#fff1f0;color:#9f1d16;border:1px solid #f0c5c0}
    .foot{margin-top:22px;padding-top:18px;border-top:1px solid #edf1ee;color:#63766a;font-size:14px;text-align:center}
    .foot a{color:#1c5231;font-weight:700}
    @media(max-width:900px){.page{grid-template-columns:1fr;max-width:560px;padding-top:42px}.intro{display:none}.card{padding:24px}.top{height:78px}.top img{height:46px}}
    @media(max-width:520px){.page{padding:28px 16px 54px}.row{grid-template-columns:1fr}.send{width:100%}.captcha{width:132px}h1{font-size:30px}}
  </style>
</head>
<body>
  <header class="top">
    <a href="{$home_url}">
      <img src="/uploadfile/202512/c35e2de6b2eae6a.png" alt="七叶庄园" onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
      <span class="logo-text">七叶庄园</span>
    </a>
  </header>

  <main class="page">
    <section class="intro">
      <p class="eyebrow">MEMBER ACCOUNT</p>
      <h1>找回七叶庄园会员密码</h1>
      <p class="lead">使用注册时绑定的手机号或邮箱获取验证码，验证通过后即可重新设置登录密码。</p>
      <div class="points">
        <div class="point"><span class="dot"></span><span>手机号找回会发送短信验证码，邮箱找回会发送邮件验证码。</span></div>
        <div class="point"><span class="dot"></span><span>验证码请在有效期内使用，频繁发送可能触发服务商限流。</span></div>
        <div class="point"><span class="dot"></span><span>重置成功后，请使用新密码重新登录会员中心。</span></div>
      </div>
    </section>

    <section class="card">
      <h2>重置密码</h2>
      <p class="hint">请输入手机号或邮箱，并完成验证码校验。</p>
      <form class="form" id="passwordForm">
        {dr_form_hidden()}
        <div>
          <label for="account">手机号 / 邮箱</label>
          <input id="account" name="account" autocomplete="username" placeholder="请输入注册手机号或邮箱">
        </div>
        <div>
          <label for="captcha">图片验证码</label>
          <div class="row">
            <input id="captcha" name="captcha" autocomplete="off" placeholder="请输入图片验证码">
            <div class="captcha" id="captchaBox">{dr_code(132, 44)}</div>
          </div>
        </div>
        <div>
          <label for="code">短信 / 邮件验证码</label>
          <div class="row">
            <input id="code" name="code" autocomplete="one-time-code" placeholder="6位验证码">
            <button class="send" id="sendCode" type="button">获取验证码</button>
          </div>
        </div>
        <div>
          <label for="password">新密码</label>
          <input id="password" name="password" type="password" autocomplete="new-password" placeholder="请输入新密码">
        </div>
        <div>
          <label for="password2">确认新密码</label>
          <input id="password2" name="password2" type="password" autocomplete="new-password" placeholder="请再次输入新密码">
        </div>
        <div id="message" class="msg"></div>
        <button class="submit" id="submitBtn" type="submit">确认重置</button>
      </form>
      <div class="foot">想起密码了？ <a href="{$login_url}">去登录</a></div>
    </section>
  </main>

  <script>
    const sendUrl = '{$send_code_url}';
    const resetUrl = '{$reset_url}';
    const form = document.getElementById('passwordForm');
    const sendButton = document.getElementById('sendCode');
    const submitButton = document.getElementById('submitBtn');
    const message = document.getElementById('message');
    const captcha = document.getElementById('captcha');
    let timer = 0;
    let ticker = null;

    function showMessage(text, ok) {
      message.textContent = text || '';
      message.className = text ? 'msg ' + (ok ? 'ok' : 'err') : 'msg';
    }
    function csrfInput() {
      return form.querySelector('input[name^="csrf_"]');
    }
    function appendToken(data) {
      const token = csrfInput();
      if (token && !data.has(token.name)) {
        data.append(token.name, token.value);
      }
      return data;
    }
    function refreshToken(res) {
      if (!res || !res.token || !res.token.name || !res.token.value) {
        return;
      }
      let token = form.querySelector('input[name="' + res.token.name + '"]');
      if (!token) {
        token = document.createElement('input');
        token.type = 'hidden';
        token.name = res.token.name;
        form.appendChild(token);
      }
      token.value = res.token.value;
    }
    function refreshCaptcha() {
      const img = document.querySelector('#captchaBox img');
      if (img) {
        img.click();
      }
      captcha.value = '';
    }
    function post(url, data) {
      return fetch(url, {
        method: 'POST',
        body: data,
        credentials: 'same-origin',
        headers: {'X-Requested-With': 'XMLHttpRequest'}
      }).then(function (response) {
        return response.text().then(function (text) {
          try {
            return JSON.parse(text);
          } catch (e) {
            throw new Error(text ? text.replace(/<[^>]+>/g, '').trim().slice(0, 120) : '接口没有返回有效数据');
          }
        });
      });
    }
    function countdown() {
      clearInterval(ticker);
      timer = 60;
      sendButton.disabled = true;
      sendButton.textContent = timer + '秒后重发';
      ticker = setInterval(function () {
        timer -= 1;
        sendButton.textContent = timer + '秒后重发';
        if (timer <= 0) {
          clearInterval(ticker);
          sendButton.disabled = false;
          sendButton.textContent = '获取验证码';
        }
      }, 1000);
    }

    sendButton.addEventListener('click', function () {
      const data = new FormData();
      data.append('account', document.getElementById('account').value.trim());
      data.append('captcha', captcha.value.trim());
      sendButton.disabled = true;
      post(sendUrl, appendToken(data)).then(function (res) {
        refreshToken(res);
        showMessage(res.msg || '验证码已发送', !!res.code);
        refreshCaptcha();
        if (res.code) {
          countdown();
        } else {
          sendButton.disabled = false;
        }
      }).catch(function (error) {
        showMessage(error && error.message ? error.message : '验证码发送请求失败，请稍后再试', false);
        refreshCaptcha();
        sendButton.disabled = false;
      });
    });

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      const data = new FormData(form);
      submitButton.disabled = true;
      post(resetUrl, data).then(function (res) {
        refreshToken(res);
        showMessage(res.msg || (res.code ? '密码已重置' : '重置失败'), !!res.code);
        if (res.code && res.data && res.data.url) {
          setTimeout(function () {
            window.location.href = res.data.url;
          }, 700);
        } else {
          submitButton.disabled = false;
        }
      }).catch(function (error) {
        showMessage(error && error.message ? error.message : '重置失败，请稍后再试', false);
        submitButton.disabled = false;
      });
    });
  </script>
</body>
</html>
