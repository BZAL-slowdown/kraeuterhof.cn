    <script>
        // 视频播放功能
        function setupVideoPlayers() {
            const videoContainers = document.querySelectorAll('.video-container');
            const modal = document.getElementById('videoModal');
            const modalVideo = document.getElementById('modalVideo');
            const modalTitle = document.getElementById('modalVideoTitle');
            const modalDescription = document.getElementById('modalVideoDescription');
            const closeModal = document.getElementById('closeModal');

            // 点击视频卡片打开模态框
            videoContainers.forEach(container => {
                container.addEventListener('click', () => {
                    const videoSrc = container.getAttribute('data-video-src');
                    const title = container.querySelector('.video-title-text').textContent;
                    const description = container.querySelector('.video-description').textContent;

                    // 设置模态框内容
                    modalVideo.innerHTML = `<source src="${videoSrc}" type="video/mp4">`;
                    modalTitle.textContent = title;
                    modalDescription.textContent = description;

                    // 显示模态框
                    modal.classList.add('active');

                    // 重新加载视频源
                    modalVideo.load();

                    // 播放视频
                    modalVideo.play().catch(error => {
                        console.log('视频播放失败:', error);
                        // 如果自动播放失败，显示用户需要手动点击播放的提示
                        modalVideo.controls = true;
                    });
                });
            });

            // 关闭模态框
            closeModal.addEventListener('click', () => {
                modal.classList.remove('active');
                modalVideo.pause();
                modalVideo.currentTime = 0;
            });

            // 点击模态框背景关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    modalVideo.pause();
                    modalVideo.currentTime = 0;
                }
            });

            // ESC键关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                    modalVideo.pause();
                    modalVideo.currentTime = 0;
                }
            });

            // 视频播放结束事件
            modalVideo.addEventListener('ended', () => {
                // 视频播放结束后可以添加一些逻辑，比如显示重播按钮等
                console.log('视频播放结束');
            });

            // 视频错误处理
            modalVideo.addEventListener('error', (e) => {
                console.error('视频加载错误:', e);
                // 可以在这里显示错误信息或备用内容
                modalVideo.innerHTML = '<p>抱歉，视频加载失败。请检查网络连接或视频文件路径。</p>';
            });
        }

        // 页面加载完成后初始化
        window.addEventListener('load', () => {
            setupVideoPlayers();
        });
    </script>
