    <script>
        // 配置API密钥和端点
        const DEEPSEEK_API_KEY = 'sk-98432ab420b64a28a24fd026f9cfffaa';
        const DEEPSEEK_API_URL = 'https://api.deepseek.com/v1/chat/completions';
        
        // 知识库数据
        const knowledgeBase = {
            <?php $zsk=dr_site_value('aizhishiku');?>
            {php $mval = $zsk;}
{loop $mval $v}
"{$v[1]}": "{$v[2]}",
{/loop}
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('deepseekChatMessages');
            const messageInput = document.getElementById('deepseekMessageInput');
            const sendButton = document.getElementById('deepseekSendButton');
            const typingIndicator = document.getElementById('deepseekTypingIndicator');
            
            // 设置初始时间
            document.getElementById('deepseekInitialTime').textContent = getCurrentTime();
            
            // 添加消息到聊天窗口
            function addMessage(message, isUser) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `deepseek-message ${isUser ? 'deepseek-user-message' : 'deepseek-ai-message'}`;
                
                const messageContent = document.createElement('div');
                // 处理换行和代码块
                message = message.replace(/\n/g, '<br>');
                message = message.replace(/```([^`]+)```/g, '<pre><code>$1</code></pre>');
                messageContent.innerHTML = message;
                messageDiv.appendChild(messageContent);
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'deepseek-message-time';
                timeDiv.textContent = getCurrentTime();
                messageDiv.appendChild(timeDiv);
                
                chatMessages.appendChild(messageDiv);
                
                // 只有在添加新消息时才自动滚动到底部
                // 如果用户正在查看历史消息，不要强制滚动
                const isAtBottom = isScrollAtBottom();
                if (isAtBottom) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }
            
            // 检查是否在滚动条底部
            function isScrollAtBottom() {
                const threshold = 100; // 距离底部的阈值
                return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight <= threshold;
            }
            
            // 获取当前时间
            function getCurrentTime() {
                const now = new Date();
                return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            }
            
            // 显示/隐藏打字指示器
            function showTypingIndicator() {
                typingIndicator.style.display = 'block';
                // 显示打字指示器时强制滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function hideTypingIndicator() {
                typingIndicator.style.display = 'none';
            }
            
            // 调用DeepSeek API
            async function callDeepSeekAPI(userMessage) {
                try {
                    showTypingIndicator();
                    
                    // 检查知识库中是否有匹配的问题
                    const knowledgeAnswer = searchKnowledgeBase(userMessage);
                    if (knowledgeAnswer) {
                        // 模拟API响应时间
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        return knowledgeAnswer;
                    }
                    
                    // 如果没有找到知识库答案，调用真实API
                    const response = await fetch(DEEPSEEK_API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer sk-98432ab420b64a28a24fd026f9cfffaa`
                        },
                        body: JSON.stringify({
                            model: "deepseek-chat",
                            messages: [
                                {
                                    role: "system",
                                    content: "你是一个专业的AI客服助手，专门回答关于DeepSeek AI服务的问题。请提供准确、有帮助的回答。"
                                },
                                {
                                    role: "user",
                                    content: userMessage
                                }
                            ],
                            max_tokens: 1000,
                            temperature: 0.7
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`API请求失败: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    return data.choices[0].message.content;
                    
                } catch (error) {
                    console.error('API调用错误:', error);
                    // 如果API调用失败，返回模拟响应
                    return getFallbackResponse(userMessage);
                } finally {
                    hideTypingIndicator();
                }
            }
            
            // 搜索知识库
            function searchKnowledgeBase(query) {
                const lowerQuery = query.toLowerCase();
                
                // 精确匹配
                for (const [question, answer] of Object.entries(knowledgeBase)) {
                    if (lowerQuery.includes(question.toLowerCase()) || 
                        question.toLowerCase().includes(lowerQuery)) {
                        return answer;
                    }
                }
                
                // 关键词匹配
                const keywords = {
                    '功能': 'DeepSeek的主要功能有哪些？',
                    '开始使用': '如何开始使用DeepSeek？',
                    '技术问题': '常见的技术问题解决方案',
                    '系统要求': '系统要求和兼容性',
                    '定价': '定价和计费方式',
                    '升级': '如何升级账户？',
                    'api': 'API调用示例',
                    '错误': 'API错误代码说明'
                };
                
                for (const [keyword, question] of Object.entries(keywords)) {
                    if (lowerQuery.includes(keyword)) {
                        return knowledgeBase[question];
                    }
                }
                
                return null;
            }
            
            // 备用响应（当API不可用时）
            function getFallbackResponse(userMessage) {
                const responses = {
                    "deepseek是什么": "DeepSeek是一家专注于人工智能技术研发的公司，提供先进的AI模型和解决方案。我们的主要产品包括DeepSeek Chat（对话AI）、DeepSeek Coder（代码生成）等，帮助开发者和企业构建智能应用。",
                    "如何使用deepseek api": "要使用DeepSeek API，您需要：1) 注册DeepSeek账户 2) 在控制台获取API密钥 3) 按照官方文档集成API。我们提供RESTful API接口和多种编程语言的SDK，支持文本生成、代码补全、对话系统等功能。",
                    "deepseek支持哪些编程语言": "DeepSeek API支持多种编程语言调用，包括Python、JavaScript、Java、Go、C#等。我们还提供了详细的文档和代码示例，帮助您快速集成到现有项目中。",
                    "deepseek的定价": "DeepSeek提供灵活的定价方案：1) 免费层：每月有一定免费调用额度 2) 按量付费：根据实际使用量计费 3) 企业版：定制化服务。具体价格请参考官网最新定价页面。",
                    "如何获取技术支持": "您可以通过以下方式获取技术支持：1) 查看官方文档 2) 发送邮件至support@deepseek.com 3) 加入开发者社区 4) 提交工单。我们的技术支持团队会在24小时内响应您的问题。"
                };
                
                const lowerMessage = userMessage.toLowerCase();
                for (const key in responses) {
                    if (lowerMessage.includes(key)) {
                        return responses[key];
                    }
                }
                
                // 默认回复
                const defaultResponses = [
                    "感谢您的提问！作为DeepSeek AI助手，我很乐意为您解答。如果您需要更详细的技术信息，建议查阅我们的官方文档。",
                    "这是一个很好的问题！DeepSeek在这方面有很多功能和应用场景，您可以具体描述一下您的需求吗？",
                    "我理解您的问题。为了给您最准确的回答，您能提供更多细节或具体的使用场景吗？",
                    "关于这个问题，我们的官方文档中有详细的说明和示例代码。您也可以直接联系我们的技术支持团队获取个性化帮助。"
                ];
                
                return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
            }
            
            // 发送消息
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (message === '') return;
                
                // 禁用输入和按钮
                messageInput.disabled = true;
                sendButton.disabled = true;
                
                addMessage(message, true);
                messageInput.value = '';
                
                try {
                    const response = await callDeepSeekAPI(message);
                    addMessage(response, false);
                } catch (error) {
                    addMessage("抱歉，暂时无法连接到AI服务。请检查您的网络连接或稍后重试。", false);
                } finally {
                    // 重新启用输入和按钮
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                    messageInput.focus();
                }
            }
            
            // 事件监听
            sendButton.addEventListener('click', sendMessage);
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            // 页面加载后自动聚焦输入框
            messageInput.focus();

            // 移动端触摸事件支持
            document.addEventListener('touchstart', function() {}, { passive: true });
        });
    </script>
</body>
</html>
